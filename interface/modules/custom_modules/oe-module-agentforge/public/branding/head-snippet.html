<!--
  Clinical Copilot — canonical <head> snippet
  ============================================

  Drop this into the OpenEMR main HTML template head (e.g. interface/main/main.php
  or whichever Twig layout wraps the chrome). The asset paths assume the
  branding bundle lives at:
    /interface/modules/custom_modules/oe-module-agentforge/public/branding/
  ...which is its location in the AgentForge module's `public/` tree.

  Absolute URLs (canonical, og:url, og:image, twitter:image, JSON-LD) are
  hardcoded to the demo VPS hostname (108-61-145-220.nip.io). Find/replace
  that hostname if you ever move to a custom domain. Everything else uses
  root-relative paths and survives a domain change as-is.

  Robots: <meta name="robots" content="noindex, nofollow"> is set because
  the VPS hosts demo PHI. Remove or flip to "index, follow" for production.
-->

<!-- ─── Encoding & viewport ─────────────────────────────────────────── -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- ─── Title & description ────────────────────────────────────────── -->
<title>Clinical Copilot — Less charting, more patient time</title>
<meta name="description" content="The AI co-pilot for clinical documentation. Native to your EMR — drafts notes at the point of care so clinicians spend more time with patients.">
<meta name="application-name" content="Clinical Copilot">
<meta name="author" content="Clinical Copilot">

<!-- ─── Canonical & robots ─────────────────────────────────────────── -->
<link rel="canonical" href="https://108-61-145-220.nip.io/">
<meta name="robots" content="noindex, nofollow">

<!-- ─── Theme & colour scheme ──────────────────────────────────────── -->
