<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph / Twitter social card. 1200x630 = the canonical OG aspect
  ratio (1.91:1) used by Slack, Discord, iMessage, LinkedIn, Facebook,
  and (with a slight crop) Twitter's summary_large_image.
  Layout: brand mark left (300px square, drop-shadowed for elevation),
  wordmark + outcome-led tagline + product positioning on the right.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     role="img" aria-label="Clinical Copilot — Less time charting. More time with patients.">
  <title>Clinical Copilot — Less time charting. More time with patients.</title>

  <defs>
    <!-- Darker bg so the favicon plate (#0A2540) has somewhere to stand out from -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#031628"/>
      <stop offset="100%" stop-color="#061B2F"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#1E5A8A" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#1E5A8A" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow lifts the plate off the dark bg so the favicon "floats" -->
    <filter id="plate-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark, scaled 5x = 300x300, centred at y=315, drop-shadowed -->
  <g transform="translate(120 165) scale(5)" filter="url(#plate-shadow)">
    <rect width="60" height="60" rx="16" fill="#0A2540"/>
