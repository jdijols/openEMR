    <path d="M21.1277 43C19.2575 43 17.5191 42.6657 15.9126 41.9972C14.3301 41.3287 12.9394 40.3976 11.7405 39.2039C10.5656 38.0101 9.64246 36.6373 8.97109 35.0854C8.3237 33.5096 8 31.8264 8 30.0358C8 28.2452 8.31171 26.562 8.93513 24.9862C9.58252 23.4105 10.4817 22.0257 11.6326 20.832C12.8075 19.6382 14.1982 18.7071 15.8047 18.0386C17.4112 17.3462 19.1855 17 21.1277 17C23.1898 17 24.9521 17.3223 26.4148 17.9669C27.9014 18.6116 29.2082 19.6024 30.3351 20.9394L26.7744 24.0193C25.2639 22.4435 23.3816 21.6556 21.1277 21.6556C19.5212 21.6556 18.1185 22.0377 16.9197 22.8017C15.7448 23.5657 14.8336 24.5803 14.1862 25.8457C13.5388 27.1111 13.2151 28.5078 13.2151 30.0358C13.2151 31.5638 13.5388 32.9605 14.1862 34.2259C14.8336 35.4674 15.7567 36.4702 16.9556 37.2342C18.1545 37.9743 19.5812 38.3444 21.2356 38.3444C22.4585 38.3444 23.5375 38.1414 24.4726 37.7355C25.4077 37.3297 26.2469 36.7208 26.9902 35.9091L30.6588 39.0248C29.6997 40.1708 28.4169 41.1258 26.8104 41.8898C25.2279 42.6299 23.3337 43 21.1277 43Z" fill="#4EA3FF"/>
  </g>

  <!-- Right column: wordmark + outcome-led tagline + production positioning.
       Cal Sans is single-weight (SemiBold) — visual hierarchy comes from
       font-size, not weight. The Helvetica chain is fallback only. -->
  <g font-family="Cal Sans, Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="475" y="290" font-size="84" fill="#FFFFFF">
      Clinical Copilot
    </text>
    <text x="475" y="345" font-size="30" fill="#B8D2E8">
      Less time charting. More time with patients.
    </text>

    <line x1="475" y1="425" x2="1060" y2="425" stroke="#1E5A8A" stroke-width="1" opacity="0.55"/>

    <text x="475" y="465" font-size="19" letter-spacing="3" fill="#7FB0D4">
      BUILT FOR CLINICIANS  ·  POINT OF CARE
    </text>
  </g>
</svg>
