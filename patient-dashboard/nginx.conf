server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for hashed asset filenames (Vite emits content-hashed names).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path returns index.html so React Router can resolve it
    # client-side (e.g., /patient/<uuid> isn't a real file but is a valid SPA route).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No caching on index.html — must always fetch the latest hash references.
    location = /index.html {
        expires 0;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Strip nginx version from response headers (defense-in-depth).
    server_tokens off;
}
