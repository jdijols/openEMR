<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Document viewer</title>
    <!--
        G2-Final-31 — custom pdfjs-driven viewer used by the host-shell
        document overlay. We render every page as a stacked canvas in a
        scrollable container so HTML-native smooth scrolling drives the
        UX, not Chrome's embedded-PDF plugin (which scrolls jankily when
        nested inside other iframes). The page is loaded by
        rail_container.html.twig as `viewer.html?file=<bytes_url>&page=N`.

        Lives in `agentforge/cui/public/` so Vite's `emptyOutDir: true`
        on the bundle build doesn't wipe it — Vite copies publicDir
        contents into the output on every build.
    -->
    <style>
        :root {
            color-scheme: dark;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #2b2b2b;
            color: #ddd;
            font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #viewer {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .agentforge-pdf-page {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            display: block;
            max-width: 100%;
            height: auto;
        }
        /*
         * G2-Final-Citation — visual bounding-box overlay rendered on
         * the cited page when a citation click forwards a `bbox` URL
         * param. Wraps each rendered canvas so the absolutely-positioned
         * highlight sits over the page without disturbing the stacked
         * scroll layout. Yellow + amber border mirrors DocumentModal's
         * existing styling so both surfaces look identical.
         */
        .agentforge-pdf-page-wrap {
            position: relative;
            display: block;
            line-height: 0;
        }
        .agentforge-pdf-bbox-overlay {
            position: absolute;
            background: rgba(255, 235, 59, 0.35);
            border: 2px solid #f9a825;
            pointer-events: none;
            box-shadow: 0 0 0 1px rgba(249, 168, 37, 0.4);
        }
        #status {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ddd;
            font-size: 14px;
            pointer-events: none;
        }
        #status[hidden] { display: none; }
        #status[data-state="error"] {
            color: #ffb4b4;
        }
    </style>
</head>
<body>
    <div id="viewer" role="document" aria-label="Document"></div>
    <div id="status">Loading document…</div>
    <script type="module">
        import * as pdfjs from './pdf.min.mjs';

        pdfjs.GlobalWorkerOptions.workerSrc = './agentforge-cui-pdf.worker.min.mjs';

        const status = document.getElementById('status');
        const viewer = document.getElementById('viewer');

        const params = new URLSearchParams(window.location.search);
        const fileUrl = params.get('file');
        const initialPage = Math.max(1, parseInt(params.get('page') || '1', 10) || 1);

        // G2-Final-Citation — parse an optional normalized bbox forwarded
        // by the host overlay (`bbox=x0,y0,x1,y1`, all in 0..1). Drop
        // silently on any malformed shape — the page still renders cleanly
        // without the highlight. Coords mirror the §6 SourceCitation
        // schema and the bboxToPixels math in agentforge/cui/src/citations/bbox.ts.
        let citedBbox = null;
        const bboxParam = params.get('bbox');
        if (bboxParam) {
            const parts = bboxParam.split(',').map((s) => parseFloat(s));
            if (
                parts.length === 4 &&
                parts.every((n) => Number.isFinite(n)) &&
                parts[2] > parts[0] &&
                parts[3] > parts[1]
            ) {
                citedBbox = parts;
            }
        }

        function setStatus(text, state) {
            if (!text) { status.hidden = true; return; }
            status.hidden = false;
            status.textContent = text;
            if (state) status.dataset.state = state;
            else delete status.dataset.state;
        }

        if (!fileUrl) {
            setStatus('Missing file parameter.', 'error');
        } else {
            renderDocument(fileUrl).catch((err) => {
                console.error('document_viewer_render_failed', err);
                setStatus('Could not load document.', 'error');
            });
        }

        async function renderDocument(url) {
            // Same-origin fetch — OpenEMR session cookies + the session_token
            // in the query string both flow through. We branch on the
            // Content-Type the bytes endpoint returns: PDF → pdfjs canvas
            // pipeline; PNG/JPEG → inline <img> in the same scroll
            // container so the document feels uniform regardless of
            // source format (lab PDFs, phone-photo intake forms, etc.).
            const resp = await fetch(url, { credentials: 'same-origin' });
            if (!resp.ok) {
                throw new Error('http_' + resp.status);
            }

            const contentType = (resp.headers.get('content-type') || '').toLowerCase().split(';')[0].trim();

            if (contentType.startsWith('image/')) {
                const blob = await resp.blob();
                renderImage(blob);
                return;
            }

            if (contentType === 'application/pdf' || contentType === '') {
                const buf = await resp.arrayBuffer();
                await renderPdf(buf);
                return;
            }

            setStatus('Unsupported document type: ' + contentType, 'error');
        }

        function renderImage(blob) {
            setStatus(null);
            // Object URL is GC'd when the iframe unloads (each modal open
            // is a fresh viewer.html load) so we don't need to revoke
            // explicitly. The img reuses the .agentforge-pdf-page
            // styling — white card on the dim backdrop, max-width:100%
            // so it scales down to the viewport without overflow.
            const objectUrl = URL.createObjectURL(blob);
            const img = document.createElement('img');
            img.className = 'agentforge-pdf-page';
            img.alt = 'Document image';
            img.src = objectUrl;
            viewer.appendChild(img);
        }

        async function renderPdf(buf) {
            // Clone the bytes for pdfjs — it transfers the underlying buffer
            // to the worker on getDocument, which would detach `buf` from
            // the main thread. Each open is a fresh viewer.html load so this
            // is precautionary; cheap insurance against future reuse bugs.
            const pdf = await pdfjs.getDocument({ data: new Uint8Array(buf) }).promise;

            setStatus(null);

            // Pick a render scale that fills most of the viewport width
            // without forcing horizontal scroll on standard 8.5×11 pages.
            const targetWidth = Math.min(viewer.clientWidth - 32, 1200);
            const probe = await pdf.getPage(1);
            const baseViewport = probe.getViewport({ scale: 1 });
            const scale = Math.max(0.75, Math.min(2.5, targetWidth / baseViewport.width));

            for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
                const page = await pdf.getPage(pageNumber);
                const viewport = page.getViewport({ scale });

                // G2-Final-Citation — wrap the canvas so the bbox overlay
                // can be absolutely positioned over the cited page. The
                // wrapper is line-height:0 so it doesn't introduce
                // descender whitespace under the canvas.
                const wrap = document.createElement('div');
                wrap.className = 'agentforge-pdf-page-wrap';
                wrap.style.width = viewport.width + 'px';
                wrap.style.height = viewport.height + 'px';

                const canvas = document.createElement('canvas');
                canvas.className = 'agentforge-pdf-page';
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                canvas.style.width = viewport.width + 'px';
                canvas.style.height = viewport.height + 'px';
                wrap.appendChild(canvas);
                viewer.appendChild(wrap);

                const ctx = canvas.getContext('2d');
                if (!ctx) continue;
                await page.render({ canvas, canvasContext: ctx, viewport }).promise;

                // Yellow highlight on the cited region of the cited page
                // when a normalized bbox was forwarded. Positions are
                // computed against the rendered canvas dimensions; mirrors
                // the bboxToPixels math used by the in-CUI DocumentModal
                // fallback so both surfaces feel identical.
                if (citedBbox !== null && pageNumber === initialPage) {
                    const overlay = document.createElement('div');
                    overlay.className = 'agentforge-pdf-bbox-overlay';
                    overlay.setAttribute('aria-label', 'Cited region highlight');
                    const left = citedBbox[0] * viewport.width;
                    const top = citedBbox[1] * viewport.height;
                    const width = (citedBbox[2] - citedBbox[0]) * viewport.width;
                    const height = (citedBbox[3] - citedBbox[1]) * viewport.height;
                    overlay.style.left = left + 'px';
                    overlay.style.top = top + 'px';
                    overlay.style.width = width + 'px';
                    overlay.style.height = height + 'px';
                    wrap.appendChild(overlay);
                }

                if (pageNumber === initialPage && pageNumber > 1) {
                    wrap.scrollIntoView({ behavior: 'auto', block: 'start' });
                }
            }
        }
    </script>
</body>
</html>
