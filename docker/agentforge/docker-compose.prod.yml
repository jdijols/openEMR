services:
  # Production overlay for AgentForge.
  # Stack with: `-f docker-compose.yml -f ../agentforge/docker-compose.override.yml -f ../agentforge/docker-compose.prod.yml`.
  #
  # Architecture: agentforge-api stays on the internal Docker network only and
  # is NEVER published to the host. Caddy is the single public entry point and
  # terminates TLS for ${AGENTFORGE_PUBLIC_HOSTNAME} via Let's Encrypt.
  agentforge-api:
    command: ['sh', '-c', 'cd /app && npm ci && npm run build && PORT=3000 node dist/index.js']
    working_dir: /app
    volumes:
      - ../../agentforge/api:/app
      # Required: src/openemr/types.ts imports ../../../contracts/module-http-paths.json,
      # which resolves to /contracts inside the container (since /app = agentforge/api).
      # Without this mount the API fails to build (TS2307) and the container exit-loops.
      - ../../agentforge/contracts:/contracts
    environment:
      PORT: '3000'
    # Intentionally NO `ports:` here — internal-only.

  caddy:
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:443:443'
      - '0.0.0.0:443:443/udp'
    env_file:
      - ${AGENTFORGE_SECRETS_FILE:-../agentforge/secrets.prod.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - patient-dashboard

  # Patient Dashboard SPA — static files served by nginx. Internal-only:
  # never published to the host. Caddy proxies /dashboard/* requests to it.
  # Build artifact must exist before `up`: run `npm run build` from
  # patient-dashboard/ first.
  patient-dashboard:
    image: nginx:alpine
    volumes:
      - ../../patient-dashboard/dist:/usr/share/nginx/html:ro
      - ../../patient-dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agentforge_internal
    # Intentionally NO `ports:` — internal-only.

volumes:
  caddy_data:
  caddy_config:
