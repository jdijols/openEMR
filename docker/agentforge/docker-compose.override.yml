services:
  # Skeleton only (Gate 0) — images/health/volumes finalized in Gate 6.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge
      POSTGRES_DB: agentforge
    networks:
      - agentforge_internal

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://agentforge:agentforge@postgres:5432/agentforge
    depends_on:
      - postgres
    networks:
      - agentforge_internal

  agentforge-api:
    image: node:20-alpine
    command: ['sleep', 'infinity']
    working_dir: /app
    depends_on:
      - postgres
      - openemr
    networks:
      - agentforge_internal

  caddy:
    image: caddy:2-alpine
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      - agentforge-api
    networks:
      - agentforge_internal

networks:
  agentforge_internal:
    driver: bridge
